# Pytest main configuration file
# This file controls global pytest behavior for the entire framework

[pytest]

# Default execution options
# -v = verbose mode
# --html = generate HTML report
# --self-contained-html = create standalone HTML report with embedded assets
# --reruns = retry failed tests automatically
# --reruns-delay = wait time before retry
addopts = -v --html=report.html --self-contained-html --reruns 2 --reruns-delay 2

# Register all custom test markers used in the framework
# This prevents PytestUnknownMarkWarning warnings

markers =

    # Fast critical validation tests for main system health
    smoke: Smoke tests

    # Full business flow validation after changes
    regression: Regression tests

    # API layer tests
    api: API tests

    # UI layer tests
    ui: UI tests

    # Negative scenario validations
    negative: Negative test scenarios

    # Quick focused validation after deployment/fix
    sanity: Sanity tests

    # High priority business-critical flows
    critical: Critical business flow tests

    # Database validation tests
    db: Database validation tests
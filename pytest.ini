# Pytest main configuration file
# This file controls global pytest behavior for the entire framework

[pytest]

# Default pytest execution options
addopts = -v --html=report.html --self-contained-html

# Register custom markers used by the automation framework
markers =
    smoke: Smoke tests
    regression: Regression tests
    api: API tests
    ui: UI tests
    db: Database tests
    negative: Negative test scenarios
    sanity: Sanity tests
    demo: Demo tests excluded from CI execution

# Test discovery folders
testpaths =
    tests
    API_Tests

# Test file naming convention
python_files = test_*.py

# Test function naming convention
python_functions = test_*

# Enable live logging during execution
log_cli = true
log_cli_level = INFO

# Ignore general deprecation warnings
filterwarnings =
    ignore::DeprecationWarning
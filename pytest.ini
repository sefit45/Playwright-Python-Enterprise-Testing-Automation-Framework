# Pytest main configuration file
# This file controls global pytest behavior for the entire framework

[pytest]

# ==============================
# Default execution options
# ==============================

# -v  → verbose output (shows each test)
# --html → generate HTML report
# --self-contained-html → embed CSS/JS inside report (portable report)
addopts = -v --html=report.html --self-contained-html


# ==============================
# Register all custom test markers
# ==============================

# Prevents PytestUnknownMarkWarning warnings
# Each marker represents a test category used in the framework

markers =

    # Fast critical validation tests for system health
    smoke: Smoke tests

    # Full business flow validation after changes
    regression: Regression tests

    # API layer tests
    api: API tests

    # UI layer tests
    ui: UI tests

    # Negative scenario validations
    negative: Negative test scenarios

    # Quick validation after deployment/fix
    sanity: Sanity tests

    # Demo tests (used for learning / retry demo / intentionally failing tests)
    # These should NOT run in CI pipelines
    demo: Demo tests excluded from CI execution


# ==============================
# Test discovery rules
# ==============================

# Pytest will look for tests in these folders
testpaths =
    tests
    API_Tests


# ==============================
# Python file patterns
# ==============================

# Only files matching this pattern will be treated as test files
python_files = test_*.py

# Test functions must start with "test_"
python_functions = test_*


# ==============================
# Logging (optional but useful)
# ==============================

# Enables live logging during test execution
log_cli = true
log_cli_level = INFO


# ==============================
# Warnings control (optional)
# ==============================

# You can ignore specific warnings here if needed
filterwarnings =
    ignore::DeprecationWarning
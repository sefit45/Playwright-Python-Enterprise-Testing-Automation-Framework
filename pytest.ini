# Pytest main configuration file
# This file controls global pytest behavior for the entire framework

[pytest]

# ==============================
# Default execution options
# ==============================

addopts = -v --html=report.html --self-contained-html --strict-markers


# ==============================
# Register all custom test markers
# ==============================

markers =

    # Fast critical validation tests for system health
    smoke: Smoke tests

    # Full business flow validation after changes
    regression: Regression tests

    # API layer tests
    api: API tests

    # UI layer tests
    ui: UI tests

    # Database layer tests
    db: Database tests

    # Negative scenario validations
    negative: Negative test scenarios

    # Quick validation after deployment/fix
    sanity: Sanity tests

    # Demo tests used for learning or intentionally failing examples
    demo: Demo tests excluded from CI execution

    # full stack UI and API tests
    fullstack: Full stack tests

    
# ==============================
# Test discovery rules
# ==============================

testpaths =
    tests
    API_Tests


# ==============================
# Python file patterns
# ==============================

python_files = test_*.py
python_functions = test_*


# ==============================
# Logging
# ==============================

log_cli = true
log_cli_level = INFO


# ==============================
# Warnings control
# ==============================

filterwarnings =
    ignore::DeprecationWarning